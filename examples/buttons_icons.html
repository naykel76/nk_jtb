<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="icon" href="./images/favicon.ico">
	<link rel="stylesheet" href="scss/jtb.scss">
	<link rel="stylesheet" href="scss/dev.scss">
	<!-- <script src="https://cdn.tailwindcss.com"></script> -->
	<title>NAYKEL - JTB</title>
</head>

<body>

	<div class="pxy-5 mx-auto">

		<div class="flex tac gg">

			<div class="bx">
				<button class="sm">Small</button>
				<button>Normal</button>
				<button class="md">Medium</button>
				<button class="lg">Large</button>
				<div class="mt-075"><code>button.{sm|md|lg}</code></div>
			</div>

			<div class="bx">
				<button class="btn sm">Small</button>
				<button class="btn"> Normal</button>
				<button class="btn md">Medium</button>
				<button class="btn lg">Large</button>
				<div class="mt-075"><code>button.btn.{sm|md|lg}</code></div>
			</div>

			<div class="bx">
				<button class="btn sm">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<button class="btn">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<button class="btn md">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<button class="btn lg">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<div class="mt-075"><code>.btn.{sm|md|lg}</code><br> Icon only using button size modifiers</div>
			</div>

			<div class="bx">
				<button class="btn">
					<svg class="icon sm">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<button class="btn">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<button class="btn">
					<svg class="icon md">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<button class="btn">
					<svg class="icon lg">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<button class="btn">
					<svg class="icon wh-5">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
				</button>
				<div class="mt-075"><code>.icon.{sm|md|lg}</code> or <code>.icon.wh-{n}</code><br>Icon only using icon size modifiers</div>
			</div>

		</div>

		<div class="flex mt gg">
			<div class="bx">
				<input class="sm" name="input" type="text" placeholder="Text Input">
				<button class="btn sm">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
					<span>Save</span>
				</button>
				<hr class="my-025">
				<input name="input" type="text" placeholder="Text Input">
				<button class="btn">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
					<span>Save</span>
				</button>
				<hr class="my-025">
				<input class="md" name="input" type="text" placeholder="Text Input">
				<button class="btn md">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
					<span>Save</span>
				</button>
				<hr class="my-025">
				<input class="lg" name="input" type="text" placeholder="Text Input">
				<button class="btn lg">
					<svg class="icon">
						<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#save"></use>
					</svg>
					<span>Save</span>
				</button>
				<br>
			</div>

			<div class="flex space-mx tac">
				<div class="bdr pxy">
					<!-- change button site -->
					<button class="btn sm">
						Small
					</button>
					<button class="btn">
						Normal
					</button>
					<button class="btn md">
						Medium
					</button>
					<button class="btn lg">
						Large
					</button>

					<div class="lh-1 mt-05">
						Button <br> Text Only
					</div>
				</div>

				<div class="bdr pxy">
					<button class="btn pxy-0375">
						<svg class="icon lg">
							<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#phone"></use>
						</svg>
					</button>
					<button class="btn pxy-0375">
						<svg class="icon lg">
							<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#cart"></use>
						</svg>
					</button>
					<button class="btn pxy-0375">
						<svg class="icon lg">
							<use xlink:href="/svg/naykel-ui-SVG-sprite.svg#user"></use>
						</svg>
					</button>
					<div class="lh-1 mt-05">
						Button <br> Icon Only
					</div>
				</div>

			</div>
		</div>
	</div>

</body>

</html>
